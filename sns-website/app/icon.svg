<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0C8D4"/>
      <stop offset="50%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#C0C8D4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="#1E293B" stroke-width="3"/>
  <!-- Blue accent line at top -->
  <rect x="96" y="42" width="320" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>
  <!-- S.N.S text -->
  <text x="256" y="290" text-anchor="middle" font-family="'Outfit','Inter',system-ui,sans-serif" font-weight="700" font-size="160" fill="url(#chrome)" letter-spacing="8">S.N.S</text>
  <!-- Tagline -->
  <text x="256" y="380" text-anchor="middle" font-family="'Inter','Outfit',system-ui,sans-serif" font-weight="500" font-size="36" fill="#64748B" letter-spacing="12">CAR CARE</text>
  <!-- Blue accent line at bottom -->
  <rect x="96" y="430" width="320" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
</svg>
